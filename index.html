<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration System (MERS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans flex items-center justify-center p-4">

    <div class="w-full max-w-3xl bg-white shadow-xl rounded-2xl overflow-hidden p-6 md:p-10 border border-slate-200">
        
        <div class="border-b border-slate-100 pb-6 mb-8">
            <h1 id="app-event-title" class="text-3xl font-extrabold text-slate-800 tracking-tight">Loading Form...</h1>
            <p id="app-event-subtitle" class="text-sm font-medium text-slate-400 mt-2 tracking-wide uppercase"></p>
        </div>

        <div id="system-alert" class="hidden p-4 rounded-xl mb-6 font-semibold"></div>

        <form id="mers-dynamic-form" class="space-y-8 hidden">
            <div id="dynamic-sections-container" class="space-y-10"></div>

            <div class="pt-4 border-t border-slate-100">
                <button type="submit" class="w-full md:w-auto px-8 py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg rounded-xl shadow-lg transition duration-200 ease-in-out transform active:scale-95 focus:outline-none focus:ring-4 focus:ring-indigo-200">
                    Submit Registration Details
                </button>
            </div>
        </form>
        
    </div>

    <script src="app.js"></script>
</body>
</html>
